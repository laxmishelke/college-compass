services:
  - type: web
    name: college-compass-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: college-compass-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGINS
        sync: false

databases:
  - name: college-compass-db
    plan: free
